# Configuration for Federated Learning (FL) and Centralized Learning (CL) Setup

# =========================
# General Configuration
# =========================

experiment_key: "hello_fl_world"

# ${oc.env:TMPFS} #

# Experiment Settings
experiment_directories:
  root_dir: /projects/semcache/github/new-project-genai/genfl/_storage/ex1
  trainer_dir: ${experiment_directories.root_dir}/trainer_dir
  fl_cache_dir: ${experiment_directories.root_dir}/fl_cache



# =========================
# Federated Learning (FL) Configuration
# =========================
fl:
  num_rounds: 1
  num_clients: 8
  clients_per_round: 8
  load_server_data: true
  use_cache_client_model: true

# =========================
# Dataset Configuration
# =========================
# Dataset Configuration

label_col:
  yahoo_answers_topics: "topic"

dataset:
  distribution: "shard" #"iid" # Change to "iid" for iid data distribution. Change it to `non_iid` for non-iid data distribution.
  # name: "yahma/alpaca-cleaned"
  name: "yahoo_answers_topics"
  label_column: ${label_col.${dataset.name}}
  num_classes_per_partition: 2 # if distribution is shard/pathological, this will be the number of classes per partition
  each_client_data_points: 5000
  server_data_points: 5000

# =========================
# PEFT Configuration for Hydra
# =========================
# Note: This section has been consolidated under the 'peft' key above.

# =========================
# Model Configuration
# =========================
model:
  name: openai-community/gpt2
  max_length: 1024
  kwargs:
    use_cache: false
    trust_remote_code: true
    # attn_implementation: "flash_attention_2"
    device_map: null
    # torch_dtype: "bfloat16"


# =========================
# PEFT (Parameter-Efficient Fine-Tuning) Configuration
# =========================
peft:
  enabled: false
  config:
    r: 4
    lora_alpha: 32
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"
    target_modules: "all-linear"
    modules_to_save: null

# =========================
# HF Trainer Configuration
# =========================
hf_trainer_args:
  remove_unused_columns: true
  num_train_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16

  # learning rate settings
  learning_rate: 1e-04
  lr_scheduler_type: cosine
  warmup_ratio: 0.2

  max_seq_length: 1024
  packing: true

  max_steps: -1
  gradient_accumulation_steps: 1

  # fp16: true
  # bf16: true
  neftune_noise_alpha: 5 # it improves the llm generated text a lot


  # logging
  output_dir: ${experiment_directories.trainer_dir}
  # overwrite_output_dir: true
  save_steps: 0 #100
  save_total_limit: 0 # 1
  save_strategy: "no"

  # logging_strategy: steps
  # logging_steps: 20
  # log_level: info
  disable_tqdm: true # Disable the progress bar for cleaner logs

# =========================
# Device and Resource Configuration
# =========================
device: "cuda" # Options: "cuda", "cpu"

total_gpus: 4
total_cpus: 16

client_resources:
  num_cpus: 3 # if its more than  # clients x num_cpus> total_cpus, it will become sequential.
  num_gpus: 1 # Only relevant if device.type is "cuda"

# =========================
# Logging Configuration (Hydra)
# =========================
# Logging Configuration (Hydra)
hydra:
  job_logging:
    root:
      level: INFO # Set the job logging level to INFO
    loggers:
      flwr:
        level: INFO
      accelerate.utils.other:
        level: ERROR
# =========================
# Additional Configurations (Optional)
# =========================
# If you have other configurations or defaults, you can include them here.
